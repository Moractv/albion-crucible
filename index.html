<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crucible — Guild Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0b0d11;
  --s1:     #13161c;
  --s2:     #1a1e27;
  --border: rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:   #e2e5eb;
  --muted:  #5a6070;
  --muted2: #8892a4;
  --urgent: #f04040;
  --warn:   #f5a623;
  --good:   #30c97e;
  --blue:   #4a8fff;
  --purple: #a97eff;
  --gold:   #fbbf24;
  --done:   #4ade80;
  --mono:   'Space Mono', monospace;
  --sans:   'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px; border-bottom: 1px solid var(--border);
  background: var(--s1); position: sticky; top: 0; z-index: 20;
}
.logo { font-family: var(--mono); font-size: 12px; letter-spacing: .12em; color: var(--gold); }
.logo span { color: var(--muted); }
.total-val { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--gold); }
.total-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
#last-update { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 4px; }

.wrap { max-width: 1300px; margin: 0 auto; padding: 24px 28px; }

/* URGENCY */
#urgency {
  background: linear-gradient(90deg, rgba(240,64,64,.1) 0%, transparent 100%);
  border: 1px solid rgba(240,64,64,.2); border-radius: 8px;
  padding: 12px 18px; margin-bottom: 20px; display: none;
}
#urgency h3 { font-size: 10px; font-family: var(--mono); color: var(--urgent);
  text-transform: uppercase; letter-spacing: .12em; margin-bottom: 10px; }
.urg-item { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 6px; }
.urg-item:last-child { margin-bottom: 0; }
.urg-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--urgent); flex-shrink: 0; animation: blink 1.4s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.urg-pct { font-family: var(--mono); font-size: 11px; color: var(--urgent); margin-left: auto; white-space: nowrap; }

/* STAT CARDS */
.stat-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 24px; }
@media(max-width:900px){ .stat-row { grid-template-columns: repeat(3,1fr); } }
.stat-card { background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; transition: border-color .15s; }
.stat-card:hover { border-color: var(--border2); }
.sc-cat { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 6px; }
.sc-val { font-size: 26px; font-family: var(--mono); font-weight: 700; line-height: 1; }
.sc-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }
.sc-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 8px; overflow: hidden; }
.sc-bar-fill { height: 100%; border-radius: 1px; transition: width .5s ease; }

/* RANKINGS */
.rank-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border);
}
.rank-title { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .12em; color: var(--muted); }
.ts-block { display: flex; gap: 16px; align-items: center; }
.ts-item { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.ts-lbl { font-size: 9px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
.ts-ref .ts-lbl { color: var(--warn); }
.ts-now .ts-lbl { color: var(--blue); }
.ts-val { font-size: 11px; font-family: var(--mono); color: var(--muted2); }
.ts-ref .ts-val { color: var(--warn); }
.ts-now .ts-val { color: var(--blue); }
.ts-divider { width: 1px; background: var(--border); align-self: stretch; }

.rank-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 28px; }
.rank-table th { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .07em; color: var(--muted); padding: 6px 10px; text-align: left; font-weight: 400; border-bottom: 1px solid var(--border); white-space: nowrap; }
.rank-table th.r { text-align: right; }
.rank-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.rank-table tr:last-child td { border-bottom: none; }
.rank-table tbody tr:hover td { background: var(--s1); }
.rnum { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--muted); }
.r1 { color: var(--gold); }
.r2 { color: var(--muted2); }
.r3 { color: #cd7f32; }
.rguild { font-weight: 500; font-size: 13px; }
.rcreator { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 1px; }
.rpts { font-family: var(--mono); font-size: 12px; text-align: right; }
.rref { font-family: var(--mono); font-size: 11px; text-align: right; color: var(--warn); opacity: .7; }
.rdelta { font-family: var(--mono); font-size: 11px; text-align: right; }
.dpos { color: var(--good); }
.dzero { color: var(--muted); }
.rpos { font-family: var(--mono); font-size: 10px; text-align: right; }
.rup { color: var(--good); }
.rdn { color: var(--urgent); }
.req { color: var(--muted); }
.rbar-wrap { width: 64px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; display: inline-block; vertical-align: middle; }
.rbar-fill { height: 100%; border-radius: 2px; }
.rank-mine td { background: rgba(169,126,255,.05); }
.rank-mine td:first-child { border-left: 2px solid var(--purple); padding-left: 8px; }
.rank-mine .rguild { color: var(--purple); }
.rank-mine .rpts { color: var(--purple); }
.mine-badge { font-size: 9px; font-family: var(--mono); color: var(--purple); margin-left: 4px; }
.rank-sep td { padding: 4px 10px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--muted); background: var(--s1); border-bottom: 1px solid var(--border); letter-spacing: .08em; }

/* FILTERS */
.filter-row { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 5px 14px; background: transparent; border: 1px solid var(--border); color: var(--muted2); border-radius: 99px; font-family: var(--sans); font-size: 12px; cursor: pointer; transition: all .15s; }
.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.filter-sep { flex: 1; }
.sort-lbl { font-size: 11px; color: var(--muted); margin-right: 4px; }
select { background: var(--s2); border: 1px solid var(--border); color: var(--muted2); padding: 4px 10px; border-radius: 6px; font-family: var(--sans); font-size: 12px; outline: none; cursor: pointer; }

/* MISSIONS TABLE */
table.mtable { width: 100%; border-collapse: collapse; }
.mtable th { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .08em; color: var(--muted); padding: 7px 12px; text-align: left; font-weight: 400; white-space: nowrap; border-bottom: 1px solid var(--border); }
.mtable th.r { text-align: right; }
.mtable td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; line-height: 1.4; }
.mtable tr:last-child td { border-bottom: none; }
.mtable tbody tr { transition: background .1s; }
.mtable tbody tr:hover td { background: var(--s1); }

/* Level pill */
.lvl-pill { display: inline-flex; align-items: center; gap: 3px; font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
.lvl-maxed  { background: rgba(74,222,128,.1);  color: var(--done);   border: 1px solid rgba(74,222,128,.2); }
.lvl-active { background: rgba(74,143,255,.08); color: var(--blue);   border: 1px solid rgba(74,143,255,.18); }
.lvl-zero   { background: rgba(90,96,112,.1);   color: var(--muted);  border: 1px solid var(--border); }
.lvl-finite { background: rgba(245,166,35,.08); color: var(--warn);   border: 1px solid rgba(245,166,35,.18); }

/* Progress */
.prog-cell { display: flex; align-items: center; gap: 8px; min-width: 150px; }
.prog-bar { width: 56px; height: 4px; background: var(--border); border-radius: 2px; flex-shrink: 0; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.prog-txt { font-family: var(--mono); font-size: 11px; color: var(--muted2); white-space: nowrap; }
.prog-pct { font-family: var(--mono); font-size: 10px; margin-left: 2px; }
.prog-none { font-size: 11px; color: var(--muted); font-style: italic; }

/* Badges */
.badge { display: inline-block; font-size: 10px; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; text-transform: uppercase; letter-spacing: .05em; white-space: nowrap; }
.b-urgent  { background: rgba(240,64,64,.1);    color: var(--urgent); border: 1px solid rgba(240,64,64,.2); }
.b-warn    { background: rgba(245,166,35,.1);   color: var(--warn);   border: 1px solid rgba(245,166,35,.2); }
.b-good    { background: rgba(48,201,126,.08);  color: var(--good);   border: 1px solid rgba(48,201,126,.18); }
.b-maxed   { background: rgba(74,222,128,.08);  color: var(--done);   border: 1px solid rgba(74,222,128,.18); }
.b-low     { background: transparent;           color: var(--muted);  border: 1px solid var(--border); }
.b-skip    { background: transparent;           color: var(--muted);  border: 1px solid var(--border); opacity: .5; }
.b-limited { background: rgba(251,191,36,.08);  color: var(--gold);   border: 1px solid rgba(251,191,36,.18); }
.b-auto    { background: rgba(74,143,255,.08);  color: var(--blue);   border: 1px solid rgba(74,143,255,.18); }

.pts-col  { font-family: var(--mono); font-size: 12px; text-align: right; }
.pts-pos  { color: var(--gold); }
.pts-zero { color: var(--muted); }
.empty    { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
</style>
</head>

<header>

    <button class="filter-btn"        data-filter="raid"     onclick="setfilter('raid',this)">Raid</button>
    <span class="filter-sep"></span>
    <span class="sort-lbl">Trier par</span>

// ── CONFIG ────────────────────────────────────────────────────────────────────
const MY_GUILD  = 'Les 2 Blondasses';
const CAT_EMOJI = { 'PvP':'⚔️','PvE':'🐉','Monde Ouvert':'🌍','Gathering':'⛏️','Guilde':'🏰' };
const CAT_COLOR = { 'PvP':'#f04040','PvE':'#30c97e','Monde Ouvert':'#4a8fff','Gathering':'#f5a623','Guilde':'#a97eff' };

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmtNum(n) {
  if (n === null || n === undefined || !isFinite(n)) return '∞';
  if (n >= 1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/,'') + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
  return Math.round(n).toLocaleString('fr');
}

// ── CLASSIFICATION MISSIONS ───────────────────────────────────────────────────
function missionType(name) {
  if (/points de saison/i.test(name))            return { counts:[], filterKeys:[] };
  if (/repaire|quartier général/i.test(name))    return { counts:[], filterKeys:[] };
  if (/rang de bronze|rang d.argent|rang d.or|rang de cristal/i.test(name)) return { counts:[], filterKeys:[] };
  if (/arène|arena cristal/i.test(name))          return { counts:['5+'],         filterKeys:['5plus'] };
  if (/corrompus létaux/i.test(name))             return { counts:['Solo'],        filterKeys:['solo'] };
  if (/profondeurs/i.test(name))                  return { counts:['Duo','Trio'],  filterKeys:['duo','duo-trio'] };
  if (/corrompus non létaux/i.test(name))         return { counts:['Solo'],        filterKeys:['solo'] };
  if (/hellgates/i.test(name))                    return { counts:['Duo','5+'],    filterKeys:['duo','5plus'] };
  if (/donjons aléatoires solo/i.test(name))      return { counts:['Solo'],        filterKeys:['solo'] };
  if (/donjons aléatoires de groupe/i.test(name)) return { counts:['5+'],          filterKeys:['5plus'] };
  if (/brumes/i.test(name))                       return { counts:['Solo','Duo'],  filterKeys:['solo','duo'] };
  if (/knightfall/i.test(name))                   return { counts:['Solo','Duo'],  filterKeys:['solo','duo'] };
  if (/brecilien/i.test(name))                    return { counts:['Solo','Duo'],  filterKeys:['solo','duo'] };
  if (/avalon.*vert|vert.*avalon/i.test(name))    return { counts:['Solo'],        filterKeys:['solo'] };
  if (/avalon.*bleu|bleu.*avalon/i.test(name))    return { counts:['5+'],          filterKeys:['5plus'] };
  if (/avalon.*or|or.*avalon/i.test(name))        return { counts:['5+'],          filterKeys:['5plus'] };
  if (/donjons statiques/i.test(name))            return { counts:['5+'],          filterKeys:['5plus'] };
  if (/donjons avaloniens/i.test(name))           return { counts:['Raid'],        filterKeys:['raid'] };
  if (/camps de monstres dynamiques/i.test(name)) return { counts:['Solo','5+'],   filterKeys:['solo','5plus'] };
  if (/cachette de boss/i.test(name))             return { counts:['Solo','5+'],   filterKeys:['solo','5plus'] };
  if (/missions de pistage/i.test(name))          return { counts:['Solo','5+'],   filterKeys:['solo','5plus'] };
  if (/contrebandier|cristaux d.énergie|noyaux de puissance/i.test(name)) return { counts:[], filterKeys:[] };
  if (/créatures de cristal/i.test(name))         return { counts:['Solo','5+'],   filterKeys:['solo','5plus'] };
  if (/renommée.*monstres.*monde ouvert/i.test(name)) return { counts:['Solo','5+'], filterKeys:['solo','5plus'] };
  if (/récolter|attrapez|poissons|pêche/i.test(name)) return { counts:['Solo'],   filterKeys:['solo'] };
  return { counts:['Solo'], filterKeys:['solo'] };
}

function isSkip(name) {
  return /Noyaux de Puissance|Cristaux d.Énergie|Parfait État/i.test(name);
}

// ── PRIORITÉ ──────────────────────────────────────────────────────────────────
function priority(m) {
  if (m.skip)       return 9;
  if (m.levelMaxed) return 8;

  // Missions "À faire" manuellement
  if (/repaire/i.test(m.name)) return 3;

  // Rangs — viendront automatiquement
  if (/rang de bronze|rang d.argent|rang d.or|rang de cristal/i.test(m.name)) return 4;

  if (!m.progression) {
    if (m.niveau && isFinite(m.niveau.tot) && m.niveau.cur >= m.niveau.tot) return 8;
    return 7;
  }

  const pct = m.progression.pct;
  if (pct === null) return m.ptsGot > 0 ? 2 : 7;
  if (pct >= 0.93) return 0;
  if (pct >= 0.70) return 1;
  if (pct >= 0.01) return 2;
  return 7;
}

function prioLabel(m) {
  const p = priority(m);
  if (m.levelMaxed) return { lbl:'✅ Terminé',     cls:'b-maxed'   };
  if (p === 9)      return { lbl:'—',               cls:'b-skip'    };
  if (p === 0)      return { lbl:'⚡ Urgent',       cls:'b-urgent'  };
  if (p === 1)      return { lbl:'🔥 Efficace',     cls:'b-warn'    };
  if (p === 2)      return { lbl:'✓ En cours',      cls:'b-good'    };
  if (p === 3)      return { lbl:'💰 À faire',      cls:'b-limited' };
  if (p === 4)      return { lbl:'🔄 Automatique',  cls:'b-auto'    };
  if (p === 7)      return { lbl:'Non débuté',      cls:'b-low'     };
  return                   { lbl:'—',               cls:'b-skip'    };
}

// ── ÉTAT ──────────────────────────────────────────────────────────────────────
let DATA       = null;
let FILTER_KEY = 'all';
let SORT       = 'prio';

// ── RENDER PRINCIPAL ──────────────────────────────────────────────────────────
function render(data) {
  DATA = data;
  if (data.timestamp) document.getElementById('last-update').textContent = 'Snapshot : ' + data.timestamp;
  const total = data.sections.reduce((s,c) => s + c.totalPts, 0);
  document.getElementById('total-pts').textContent = total.toLocaleString('fr');
  renderStats(data.sections);
  renderUrgent(data.sections);
  renderMissions();
}

function renderStats(sections) {
  const max = Math.max(...sections.map(s => s.totalPts));
  document.getElementById('stats').innerHTML = sections.map(s => {
    const color = CAT_COLOR[s.name] || '#6b7280';
    const pct   = max > 0 ? (s.totalPts / max * 100).toFixed(0) : 0;
    const emoji = CAT_EMOJI[s.name] || '';
    return `<div class="stat-card">
      <div class="sc-cat">${emoji} ${s.name}</div>
      <div class="sc-val" style="color:${color}">${s.totalPts}</div>
      <div class="sc-sub">points obtenus</div>
      <div class="sc-bar"><div class="sc-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');
}

function renderUrgent(sections) {
  const el   = document.getElementById('urgency');
  const list = document.getElementById('urg-list');
  const urgents = [];
  sections.forEach(s => s.missions.forEach(m => {
    if (isSkip(m.name)) return;
    if (/repaire|rang de/i.test(m.name)) return;
    const lMaxed = m.niveau && m.niveau.tot !== null && isFinite(m.niveau.tot) && m.niveau.cur >= m.niveau.tot;
    if (!lMaxed && m.progression && m.progression.pct !== null && m.progression.pct >= 0.90) {
      const rest = fmtNum(m.progression.tot - m.progression.cur);
      urgents.push(`<div class="urg-item">
        <div class="urg-dot"></div>
        <span>${m.name}</span>
        <span class="urg-pct">${(m.progression.pct*100).toFixed(1)}% — ${rest} restant</span>
      </div>`);
    }
  }));
  el.style.display = urgents.length ? 'block' : 'none';
  list.innerHTML = urgents.join('');
}

// ── CLASSEMENT ────────────────────────────────────────────────────────────────
function renderRankings() {
  const section = document.getElementById('rankings-out');
  if (!section) return;
  if (!INJECTED_RANKINGS || !INJECTED_RANKINGS.guilds) {
    section.innerHTML = '';
    return;
  }

  const guilds   = Array.isArray(INJECTED_RANKINGS.guilds)
  ? INJECTED_RANKINGS.guilds
  : (INJECTED_RANKINGS.guilds.value || []);

const baseGuilds = INJECTED_BASELINE
  ? (Array.isArray(INJECTED_BASELINE.guilds)
      ? INJECTED_BASELINE.guilds
      : (INJECTED_BASELINE.guilds.value || []))
  : null;
  const maxPts   = Math.max(...guilds.map(g => g.score || g.points || g.totalPoints || 0));

  const myIdx = guilds.findIndex(g => (g.guildName || g.name || g.guild || '') === MY_GUILD);
  const start = Math.max(0, myIdx - 3);
  const end   = Math.min(guilds.length, myIdx + 4);
  const around = guilds.slice(start, end);

  function buildRow(g, i) {
    const rank    = i + 1;
    const name    = g.guildName || g.name || g.guild || '?';
    const creator = g.creatorName || g.creator || '';
    const pts     = g.score || g.points || g.totalPoints || 0;
    const isMine  = name === MY_GUILD;

    let basePts = null;
    if (baseGuilds) {
      const base = baseGuilds.find(b => (b.guildName || b.name || b.guild) === name);
      if (base) basePts = base.score || base.points || base.totalPoints || 0;
    }

    const delta    = basePts !== null ? pts - basePts : null;
    const deltaHtml = delta === null ? '<span class="dzero">—</span>'
                    : delta > 0     ? `<span class="dpos">+${delta.toLocaleString('fr')}</span>`
                    :                 '<span class="dzero">—</span>';

    const refHtml  = basePts !== null ? basePts.toLocaleString('fr') : '—';
    const barPct   = maxPts > 0 ? (pts / maxPts * 100).toFixed(0) : 0;
    const rankCls  = rank === 1 ? 'r1' : rank === 2 ? 'r2' : rank === 3 ? 'r3' : '';
    const rowCls   = isMine ? 'rank-mine' : '';

    // Position (delta de rang)
    let posHtml = '<span class="req">= stable</span>';
    if (baseGuilds) {
      const baseRank = baseGuilds.findIndex(b => (b.guildName || b.name || b.guild) === name) + 1;
      if (baseRank > 0) {
        const diff = baseRank - rank; // positif = monté
        if (diff > 0)      posHtml = `<span class="rup">▲${diff}</span>`;
        else if (diff < 0) posHtml = `<span class="rdn">▼${Math.abs(diff)}</span>`;
      }
    }

    return `<tr class="${rowCls}">
      <td><span class="rnum ${rankCls}">#${rank}</span></td>
      <td><div class="rguild">${name}${isMine ? ' <span class="mine-badge">◄ NOUS</span>' : ''}</div>${creator ? `<div class="rcreator">${creator}</div>` : ''}</td>
      <td class="rref r">${refHtml}</td>
      <td class="rpts r">${pts.toLocaleString('fr')}</td>
      <td class="rdelta r">${deltaHtml}</td>
      <td class="rpos r">${posHtml}</td>
      <td style="text-align:right"><div class="rbar-wrap"><div class="rbar-fill" style="width:${barPct}%;background:${isMine ? 'var(--purple)' : 'var(--muted)'}"></div></div></td>
    </tr>`;
  }

  const aroundRows = around.map((g) => buildRow(g, guilds.indexOf(g))).join('');

  const gapBefore = start;
  const gapAfter  = guilds.length - end;

  const sepBefore = gapBefore > 0
    ? `<tr class="rank-sep"><td colspan="7">· · · ${gapBefore} équipe${gapBefore>1?'s':''} au-dessus · · ·</td></tr>`
    : '';
  const sepAfter = gapAfter > 0
    ? `<tr class="rank-sep"><td colspan="7">· · · ${gapAfter} équipe${gapAfter>1?'s':''} en dessous · · ·</td></tr>`
    : '';

  const tsRef = INJECTED_BASELINE ? INJECTED_BASELINE.timestamp || '—' : '—';
  const tsNow = INJECTED_RANKINGS.timestamp || '—';

  section.innerHTML = `
    <div class="rank-header">
      <div class="rank-title">🏆 Classement général — Europe</div>
      <div class="ts-block">
        <div class="ts-item ts-ref">
          <span class="ts-lbl">Référence (début de journée)</span>
          <span class="ts-val">${tsRef}</span>
        </div>
        <div class="ts-divider"></div>
        <div class="ts-item ts-now">
          <span class="ts-lbl">Actuel (dernière capture)</span>
          <span class="ts-val">${tsNow}</span>
        </div>
      </div>
    </div>
    <table class="rank-table">
      <thead><tr>
        <th style="width:36px">#</th>
        <th>Guilde</th>
        <th class="r">Ref.</th>
        <th class="r">Actuel</th>
        <th class="r">Aujourd'hui</th>
        <th class="r">Position</th>
        <th class="r">Part</th>
      </tr></thead>
      <tbody>
        ${sepBefore}
        ${aroundRows}
        ${sepAfter}
      </tbody>
    </table>`;
}

// ── MISSIONS ──────────────────────────────────────────────────────────────────
function getMissionType(m) {
  if (!m._mtype) m._mtype = missionType(m.name);
  return m._mtype;
}

function renderMissions() {
  if (!DATA) return;
  const out = document.getElementById('missions-out');

  let allMissions = [];
  DATA.sections.forEach(section => {
    section.missions.forEach(m => allMissions.push({ ...m, _cat: section.name }));
  });

  if (FILTER_KEY !== 'all') {
    allMissions = allMissions.filter(m => {
      const t = getMissionType(m);
      return t.filterKeys && t.filterKeys.includes(FILTER_KEY);
    });
  }

  if (!allMissions.length) {
    out.innerHTML = '<div class="empty">Aucune mission pour ce filtre</div>';
    return;
  }

  allMissions.sort((a, b) => {
    if (SORT === 'pct') {
      return (b.progression?.pct ?? -1) - (a.progression?.pct ?? -1);
    }
    if (SORT === 'pts') return (b.ptsNext || 0) - (a.ptsNext || 0);

    const pa = priority(a), pb = priority(b);
    if (pa !== pb) return pa - pb;

    // Tiebreaker 1 : niveau fini avant infini
    const aFini = a.niveau && !(a.niveau.infinite === true || a.niveau.tot === null);
    const bFini = b.niveau && !(b.niveau.infinite === true || b.niveau.tot === null);
    if (aFini && !bFini) return -1;
    if (!aFini && bFini) return 1;

    // Tiebreaker 2 : alphabétique
    return a.name.localeCompare(b.name, 'fr');
  });

  const rows = allMissions.map(m => renderRow(m)).join('');
  out.innerHTML = `<table class="mtable">
    <thead><tr>
      <th style="width:35%">Mission</th>
      <th style="width:22%">Progression</th>
      <th>Niveau</th>
      <th>Joueurs</th>
      <th class="r">Pts obtenus</th>
      <th class="r">Suivant</th>
      <th class="r">Statut</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderRow(m) {
  const t = getMissionType(m);

  // Toujours recalculer depuis le nom
  m.skip = isSkip(m.name);
  const niv    = m.niveau;
  m.levelMaxed = niv && niv.tot !== null && niv.tot !== undefined && isFinite(niv.tot) && niv.cur >= niv.tot;
  m.levelZero  = niv && niv.cur === 0;
  m.levelInf   = niv && (niv.infinite === true || niv.tot === null || niv.tot === undefined);

  const catColor = CAT_COLOR[m._cat] || 'var(--muted)';
  const catLabel = `<div style="font-size:10px;color:${catColor};margin-top:2px;font-family:var(--mono)">${m._cat || ''}</div>`;

  // Niveau
  let lvlHtml;
  if (!m.niveau)       lvlHtml = '<span class="lvl-pill lvl-zero">—</span>';
  else if (m.levelMaxed) lvlHtml = `<span class="lvl-pill lvl-maxed">✓ ${fmtNum(m.niveau.cur)}/${fmtNum(m.niveau.tot)}</span>`;
  else if (m.levelInf)   lvlHtml = `<span class="lvl-pill lvl-active">niv. ${fmtNum(m.niveau.cur)} / ∞</span>`;
  else if (m.levelZero)  lvlHtml = `<span class="lvl-pill lvl-zero">niv. 0/${fmtNum(m.niveau.tot)}</span>`;
  else                   lvlHtml = `<span class="lvl-pill lvl-finite">niv. ${fmtNum(m.niveau.cur)}/${fmtNum(m.niveau.tot)}</span>`;

  // Progression
  let progHtml;
  if (m.levelMaxed) {
    progHtml = '<span class="prog-none">palier maximal atteint</span>';
  } else if (!m.progression) {
    progHtml = '<span class="prog-none">—</span>';
  } else {
    const pct    = m.progression.pct;
    const pctNum = pct !== null ? pct : 0;
    const color  = pctNum >= 0.90 ? 'var(--urgent)' : pctNum >= 0.70 ? 'var(--warn)' : pctNum >= 0.35 ? 'var(--good)' : 'var(--muted)';
    const pctTxt = pct !== null ? (pct*100).toFixed(0)+'%' : '?';
    const cur    = fmtNum(m.progression.cur);
    const tot    = m.progression.infinite ? '∞' : fmtNum(m.progression.tot);
    const barW   = pct !== null ? Math.min(100, pctNum*100).toFixed(0) : 0;
    progHtml = `<div class="prog-cell">
      <div class="prog-bar"><div class="prog-fill" style="width:${barW}%;background:${color}"></div></div>
      <span class="prog-txt">${cur} / ${tot}</span>
      <span class="prog-pct" style="color:${color}">${pctTxt}</span>
    </div>`;
  }

  // Badges joueurs
  let joueursHtml = '';
  if (!m.levelMaxed && !m.skip && t.counts && t.counts.length > 0) {
    const badgeStyle = {
      'Solo':  'background:rgba(74,143,255,.1);color:#4a8fff;border-color:rgba(74,143,255,.3)',
      'Duo':   'background:rgba(245,166,35,.1);color:#f5a623;border-color:rgba(245,166,35,.3)',
      'Trio':  'background:rgba(48,201,126,.1);color:#30c97e;border-color:rgba(48,201,126,.3)',
      '5+':   'background:rgba(169,126,255,.1);color:#a97eff;border-color:rgba(169,126,255,.3)',
      'Raid': 'background:rgba(232,121,249,.1);color:#e879f9;border-color:rgba(232,121,249,.3)',
    };
    joueursHtml = `<div style="display:flex;gap:4px;flex-wrap:wrap">${
      t.counts.map(c => `<span style="display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid;${badgeStyle[c]||''}">${c}</span>`).join('')
    }</div>`;
  }

  // Statut
  const { lbl: statusLbl, cls: statusCls } = prioLabel(m);
  const statusBadge = `<span class="badge ${statusCls}">${statusLbl}</span>`;

  const ptsGotHtml  = m.ptsGot  > 0 ? `<span class="pts-pos">${m.ptsGot}</span>`  : '<span class="pts-zero">—</span>';
  const ptsNextHtml = m.ptsNext > 0 ? `<span style="color:var(--blue)">+${m.ptsNext}</span>` : '<span class="pts-zero">—</span>';

  return `<tr>
    <td><div style="font-weight:500;font-size:13px">${m.name}</div>${catLabel}</td>
    <td>${progHtml}</td>
    <td>${lvlHtml}</td>
    <td>${joueursHtml}</td>
    <td class="pts-col">${ptsGotHtml}</td>
    <td class="pts-col">${ptsNextHtml}</td>
    <td style="text-align:right">${statusBadge}</td>
  </tr>`;
}

// ── CONTRÔLES ─────────────────────────────────────────────────────────────────
function setfilter(key, el) {
  FILTER_KEY = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderMissions();
}
function resort() {
  SORT = document.getElementById('sort-sel').value;
  renderMissions();
}

// ── AUTO-REFRESH ──────────────────────────────────────────────────────────────
let lastTimestamp = null;
async function checkForUpdates() {
  try {
    const r = await fetch(location.href + '?t=' + Date.now(), { cache: 'no-store' });
    const html = await r.text();
    const match = html.match(/"timestamp":"([^"]+)"/);
    if (!match) return;
    const newTs = match[1];
    if (lastTimestamp === null) { lastTimestamp = newTs; return; }
    if (newTs !== lastTimestamp) { lastTimestamp = newTs; location.reload(); }
  } catch(_) {}
}
setInterval(checkForUpdates, 2 * 60 * 1000);

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (typeof INJECTED_DATA !== 'undefined' && INJECTED_DATA && INJECTED_DATA.sections) {
    lastTimestamp = INJECTED_DATA.timestamp || null;
    render(INJECTED_DATA);
    renderRankings();
  } else {
    document.getElementById('last-update').textContent = 'En attente des données (lancer scraper.ps1)';
    document.getElementById('total-pts').textContent   = '—';
  }
});
</script>

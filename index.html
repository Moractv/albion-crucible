<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crucible — Guild Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0b0d11;
  --s1:       #13161c;
  --s2:       #1a1e27;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.13);
  --text:     #e2e5eb;
  --muted:    #5a6070;
  --muted2:   #8892a4;
  --urgent:   #f04040;
  --warn:     #f5a623;
  --good:     #30c97e;
  --blue:     #4a8fff;
  --purple:   #a97eff;
  --gold:     #fbbf24;
  --done:     #4ade80;
  --mono: 'Space Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }

/* HEADER */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px; border-bottom: 1px solid var(--border);
  background: var(--s1); position: sticky; top: 0; z-index: 20;
}
.logo { font-family: var(--mono); font-size: 12px; letter-spacing: .12em; color: var(--gold); }
.logo span { color: var(--muted); }
.header-right { display: flex; align-items: center; gap: 24px; }
.total-block { text-align: right; }
.total-val { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--gold); }
.total-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
#last-update { font-size: 11px; color: var(--muted); font-family: var(--mono); }

/* LAYOUT */
.wrap { max-width: 1300px; margin: 0 auto; padding: 24px 28px; }

/* PASTE ZONE */






















.btn {
  padding: 7px 18px; background: var(--blue); color: #fff;
  border: none; border-radius: 6px; font-family: var(--sans);
  font-size: 12px; font-weight: 500; cursor: pointer; transition: opacity .15s;
}
.btn:hover { opacity: .82; }
.btn-ghost {
  padding: 6px 14px; background: var(--s2); border: 1px solid var(--border2);
  color: var(--muted2); border-radius: 6px; font-family: var(--sans);
  font-size: 12px; cursor: pointer; transition: border-color .15s, color .15s;
}
.btn-ghost:hover { border-color: var(--blue); color: var(--text); }


/* URGENCY BANNER */
#urgency {
  background: linear-gradient(90deg, rgba(240,64,64,.1) 0%, transparent 100%);
  border: 1px solid rgba(240,64,64,.2); border-radius: 8px;
  padding: 12px 18px; margin-bottom: 20px; display: none;
}
#urgency h3 { font-size: 10px; font-family: var(--mono); color: var(--urgent);
  text-transform: uppercase; letter-spacing: .12em; margin-bottom: 10px; }
.urg-item { display: flex; align-items: center; gap: 10px; font-size: 13px; margin-bottom: 6px; }
.urg-item:last-child { margin-bottom: 0; }
.urg-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--urgent); flex-shrink: 0; animation: blink 1.4s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.urg-pct { font-family: var(--mono); font-size: 11px; color: var(--urgent); margin-left: auto; white-space: nowrap; }

/* STAT CARDS */
.stat-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 24px; }
@media(max-width:900px){ .stat-row { grid-template-columns: repeat(3,1fr); } }
.stat-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; transition: border-color .15s;
}
.stat-card:hover { border-color: var(--border2); }
.sc-cat { font-size: 10px; font-family: var(--mono); text-transform: uppercase;
  letter-spacing: .1em; color: var(--muted); margin-bottom: 6px; }
.sc-val { font-size: 26px; font-family: var(--mono); font-weight: 700; line-height: 1; }
.sc-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }
.sc-bar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 8px; overflow: hidden; }
.sc-bar-fill { height: 100%; border-radius: 1px; transition: width .5s ease; }

/* FILTERS */
.filter-row { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filter-btn {
  padding: 5px 14px; background: transparent; border: 1px solid var(--border);
  color: var(--muted2); border-radius: 99px; font-family: var(--sans);
  font-size: 12px; cursor: pointer; transition: all .15s;
}
.filter-btn:hover { border-color: var(--border2); color: var(--text); }
.filter-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.filter-sep { flex: 1; }
.sort-lbl { font-size: 11px; color: var(--muted); margin-right: 4px; }
select {
  background: var(--s2); border: 1px solid var(--border); color: var(--muted2);
  padding: 4px 10px; border-radius: 6px; font-family: var(--sans); font-size: 12px;
  outline: none; cursor: pointer;
}

/* MISSIONS */
.cat-block { margin-bottom: 32px; }
.cat-header {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 8px; margin-bottom: 2px;
  border-bottom: 1px solid var(--border);
}
.cat-name { font-size: 11px; font-family: var(--mono); text-transform: uppercase; letter-spacing: .12em; }
.cat-pts { font-family: var(--mono); font-size: 12px; color: var(--gold); margin-left: auto; }

table.mtable { width: 100%; border-collapse: collapse; }
.mtable th {
  font-size: 10px; font-family: var(--mono); text-transform: uppercase;
  letter-spacing: .08em; color: var(--muted); padding: 7px 12px;
  text-align: left; font-weight: 400; white-space: nowrap;
  border-bottom: 1px solid var(--border);
}
.mtable th.r { text-align: right; }
.mtable td {
  padding: 9px 12px; border-bottom: 1px solid var(--border);
  vertical-align: middle; line-height: 1.4;
}
.mtable tr:last-child td { border-bottom: none; }
.mtable tbody tr { transition: background .1s; }
.mtable tbody tr:hover td { background: var(--s1); }

/* Level pill */
.lvl-pill {
  display: inline-flex; align-items: center; gap: 3px;
  font-family: var(--mono); font-size: 10px; padding: 2px 7px;
  border-radius: 4px; white-space: nowrap;
}
.lvl-maxed  { background: rgba(74,222,128,.1); color: var(--done); border: 1px solid rgba(74,222,128,.2); }
.lvl-active { background: rgba(74,143,255,.08); color: var(--blue); border: 1px solid rgba(74,143,255,.18); }
.lvl-zero   { background: rgba(90,96,112,.1); color: var(--muted); border: 1px solid var(--border); }
.lvl-finite { background: rgba(245,166,35,.08); color: var(--warn); border: 1px solid rgba(245,166,35,.18); }

/* Progress */
.prog-cell { display: flex; align-items: center; gap: 8px; min-width: 150px; }
.prog-bar { width: 56px; height: 4px; background: var(--border); border-radius: 2px; flex-shrink: 0; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
.prog-txt { font-family: var(--mono); font-size: 11px; color: var(--muted2); white-space: nowrap; }
.prog-pct { font-family: var(--mono); font-size: 10px; margin-left: 2px; }
.prog-none { font-size: 11px; color: var(--muted); font-style: italic; }

/* Badges */
.badge {
  display: inline-block; font-size: 10px; font-family: var(--mono);
  padding: 2px 7px; border-radius: 4px; text-transform: uppercase;
  letter-spacing: .05em; white-space: nowrap;
}
.b-urgent  { background: rgba(240,64,64,.1);   color: var(--urgent); border: 1px solid rgba(240,64,64,.2); }
.b-warn    { background: rgba(245,166,35,.1);  color: var(--warn);   border: 1px solid rgba(245,166,35,.2); }
.b-good    { background: rgba(48,201,126,.08); color: var(--good);   border: 1px solid rgba(48,201,126,.18); }
.b-maxed   { background: rgba(74,222,128,.08); color: var(--done);   border: 1px solid rgba(74,222,128,.18); }
.b-multi   { background: rgba(169,126,255,.08);color: var(--purple); border: 1px solid rgba(169,126,255,.18); }
.b-limited { background: rgba(251,191,36,.08); color: var(--gold);   border: 1px solid rgba(251,191,36,.18); }
.b-low     { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.b-skip    { background: transparent; color: var(--muted); border: 1px solid var(--border); opacity: .5; }

.pts-col { font-family: var(--mono); font-size: 12px; text-align: right; }
.pts-pos { color: var(--gold); }
.pts-zero { color: var(--muted); }

/* empty */
.empty { padding: 40px; text-align: center; color: var(--muted); font-size: 13px; }
</style>
</head>

// ── HELPERS ───────────────────────────────────────────────────────────────────────
function parseRatio(str) {
  // Retourne { cur, tot, pct, infinite } ou null
  if (!str || str.trim() === '-' || str.trim() === '') return null;
  str = str.trim();
  const inf = str.includes('∞') || str.toLowerCase().includes('infinity');
  const mult = s => ({ 'k':1e3,'m':1e6,'K':1e3,'M':1e6 }[s] || 1);
  // Matches "1.7K/4.5K" or "80/105" or "2/∞"
  const m = str.match(/^([\d.,]+)\s*([KMkm]?)\s*\/\s*([\d.,∞]+)\s*([KMkm]?)$/);
  if (!m) return null;
  const cur = parseFloat(m[1].replace(',','.')) * mult(m[2]);
  const tot = inf ? Infinity : parseFloat(m[3].replace(',','.')) * mult(m[4]);
  const pct = isFinite(tot) ? cur / tot : null;
  return { cur, tot, pct, infinite: inf };
}

function fmtNum(n) {
  if (n === null || n === undefined || !isFinite(n)) return '∞';
  if (n >= 1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/,'') + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K';
  return Math.round(n).toLocaleString('fr');
}

// ── PARSE HTML ────────────────────────────────────────────────────────────────────
function parseJournal(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const table = doc.querySelector('table');
  if (!table) return null;

  // Timestamp depuis la page
  let timestamp = null;
  const tsEl = doc.querySelector('.creator-battle-record-date span:last-child');
  if (tsEl) timestamp = tsEl.textContent.trim();
  if (!timestamp) {
    const m = html.match(/(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2}:\d{2})/);
    if (m) timestamp = m[1];
  }

  const sections = [];
  let cur = null;

  table.querySelectorAll('tr').forEach(tr => {
    // Détection section header
    const isHeader = tr.classList.contains('journal-section-header') ||
                     tr.querySelector('[id$="-section"]');

    const cells = [...tr.querySelectorAll('td')].map(td =>
      td.textContent.replace(/\s+/g,' ').replace(/&amp;/g,'&').trim()
    );
    if (cells.length < 2) return;

    if (isHeader) {
      // Chercher le nom de section
      const nameEl = tr.querySelector('[id$="-section"]') || tr.querySelector('.journal-header-title');
      const name = nameEl ? nameEl.textContent.trim() : cells[0].replace(/[−\-]/,'').trim();
      // Total pts = dernière cellule
      const pts = parseInt(cells[cells.length - 1]) || 0;
      cur = { name: name.replace(/\n/g,'').trim(), totalPts: pts, missions: [] };
      sections.push(cur);
      return;
    }

    if (!cur || cells.length < 4) return;
    const name = cells[0].replace(/\n/g,' ').trim();
    if (!name || name.length < 3) return;

    // Colonnes : Mission(0) | Progression(1) | Niveau(2) | Pts suivant(3) | Pts obtenus(4)
    const progression = parseRatio(cells[1]);  // avancement DANS le niveau actuel
    const niveau      = parseRatio(cells[2]);  // palier courant / palier max
    const ptsNext     = parseInt(cells[3]) || 0;
    const ptsGot      = parseInt(cells[4]) || 0;

    // Niveau maxed = niveau fini, plus rien à faire
    // Ex: "1/1" → cur==tot→ finite && cur>=tot
    const levelMaxed = niveau && niveau.tot !== null && niveau.tot !== undefined && isFinite(niveau.tot) && niveau.cur >= niveau.tot;
    // Niveau non commencé = 0/X ou 0/∞
    const levelZero  = niveau && niveau.cur === 0;
    // Niveau infini
    const levelInf   = niveau && (niveau.infinite === true || niveau.tot === null || niveau.tot === undefined);

    const { type, lbl } = missionType(name);
    const skip = isSkip(name);

    cur.missions.push({
      name, progression, niveau, ptsNext, ptsGot,
      type, lbl, skip, levelMaxed, levelZero, levelInf
    });
  });

  return { timestamp, sections };
}

// ── PRIORITÉ ──────────────────────────────────────────────────────────────────────
function priority(m) {
  if (m.skip)        return 9; // toujours en bas
  if (m.levelMaxed)  return 8; // fini
  if (!m.progression) {
    // pas de progression → soit fini, soit pas commencé
    if (m.niveau && isFinite(m.niveau.tot) && m.niveau.cur >= m.niveau.tot) return 8;
    return 6;
  }
  const pct = m.progression.pct;
  if (pct === null) return 5; // infini, on ne peut pas estimer
  if (pct >= 0.93) return 0;
  if (pct >= 0.70) return 1;
  if (pct >= 0.01) return 2;  // En cours dès 1%
  return 9;                    // 0% → skip
}

function prioLabel(m) {
  const p = priority(m);
  if (m.levelMaxed) return { lbl:'✅ Terminé',    cls:'b-maxed'  };
  if (p === 0)      return { lbl:'⚡ Urgent',      cls:'b-urgent' };
  if (p === 1)      return { lbl:'🔥 Efficace',    cls:'b-warn'   };
  if (p === 2)      return { lbl:'✓ En cours',     cls:'b-good'   };
  return                   { lbl:'Non débuté',     cls:'b-skip'   };
}

// ── RENDU ─────────────────────────────────────────────────────────────────────────
let DATA = null;
let FILTER_KEY = 'all';
let SORT = 'prio';

function render(data) {
  DATA = data;

  // Timestamp
  if (data.timestamp) {
    document.getElementById('last-update').textContent = 'Snapshot : ' + data.timestamp;
  }

  // Total
  const total = data.sections.reduce((s,c) => s + c.totalPts, 0);
  document.getElementById('total-pts').textContent = total.toLocaleString();

  renderStats(data.sections);
  renderUrgent(data.sections);
  renderMissions();
}

function renderStats(sections) {
  const max = Math.max(...sections.map(s => s.totalPts));
  document.getElementById('stats').innerHTML = sections.map(s => {
    const color = CAT_COLOR[s.name] || '#6b7280';
    const pct   = max > 0 ? (s.totalPts / max * 100).toFixed(0) : 0;
    const emoji = CAT_EMOJI[s.name] || '';
    return `<div class="stat-card">
      <div class="sc-cat">${emoji} ${s.name}</div>
      <div class="sc-val" style="color:${color}">${s.totalPts}</div>
      <div class="sc-sub">points obtenus</div>
      <div class="sc-bar"><div class="sc-bar-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>`;
  }).join('');
}

function renderUrgent(sections) {
  const el = document.getElementById('urgency');
  const list = document.getElementById('urg-list');
  const urgents = [];
  sections.forEach(s => s.missions.forEach(m => {
    if (!m.skip && !m.levelMaxed && m.progression && m.progression.pct !== null && m.progression.pct >= 0.90) {
      const rest = fmtNum(m.progression.tot - m.progression.cur);
      urgents.push(`<div class="urg-item">
        <div class="urg-dot"></div>
        <span>${m.name}</span>
        <span class="urg-pct">${(m.progression.pct*100).toFixed(1)}% — ${rest} restant</span>
      </div>`);
    }
  }));
  if (urgents.length) {
    el.style.display = 'block';
    list.innerHTML = urgents.join('');
  } else {
    el.style.display = 'none';
  }
}

function getMissionType(m) {
  if (!m._mtype) m._mtype = missionType(m.name);
  return m._mtype;
}

function renderMissions() {
  if (!DATA) return;
  const out = document.getElementById('missions-out');

  // Aplatir toutes les missions en une seule liste avec leur catégorie
  let allMissions = [];
  DATA.sections.forEach(section => {
    section.missions.forEach(m => {
      allMissions.push({ ...m, _cat: section.name });
    });
  });

  // Filtrer par joueurs
  if (FILTER_KEY !== 'all') {
    allMissions = allMissions.filter(m => {
      const t = getMissionType(m);
      return t.filterKeys && t.filterKeys.includes(FILTER_KEY);
    });
  }

  if (!allMissions.length) {
    out.innerHTML = '<div class="empty">Aucune mission pour ce filtre</div>';
    return;
  }

  // Trier
  allMissions.sort((a, b) => {
    if (SORT === 'pct') {
      const pa = a.progression?.pct ?? -1;
      const pb = b.progression?.pct ?? -1;
      return pb - pa;
    }
    if (SORT === 'pts') return (b.ptsNext || 0) - (a.ptsNext || 0);
    return priority(a) - priority(b);
  });

  const rows = allMissions.map(m => renderRow(m)).join('');
  out.innerHTML = `<table class="mtable">
    <thead><tr>
      <th style="width:35%">Mission</th>
      <th style="width:22%">Progression</th>
      <th>Niveau</th>
      <th>Joueurs</th>
      <th class="r">Pts obtenus</th>
      <th class="r">Suivant</th>
      <th class="r">Statut</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderRow(m) {
  // Recompute derived fields from JSON data
  const t = getMissionType(m);
  if (m.skip === undefined) m.skip = isSkip(m.name);
  if (m.levelMaxed === undefined) {
    const niv = m.niveau;
    m.levelMaxed = niv && niv.tot !== null && niv.tot !== undefined && isFinite(niv.tot) && niv.cur >= niv.tot;
    m.levelZero  = niv && niv.cur === 0;
    m.levelInf   = niv && (niv.infinite === true || niv.tot === null || niv.tot === undefined);
  }

  // ── CATÉGORIE (petite étiquette sous le nom) ──────────────────────────────
  const catColor = CAT_COLOR[m._cat] || 'var(--muted)';
  const catLabel = `<div style="font-size:10px;color:${catColor};margin-top:2px;font-family:var(--mono)">${m._cat || ''}</div>`;

  // ── NIVEAU ────────────────────────────────────────────────────────────────
  let lvlHtml;
  if (!m.niveau) {
    lvlHtml = '<span class="lvl-pill lvl-zero">—</span>';
  } else if (m.levelMaxed) {
    lvlHtml = `<span class="lvl-pill lvl-maxed">✓ ${fmtNum(m.niveau.cur)}/${fmtNum(m.niveau.tot)}</span>`;
  } else if (m.levelInf) {
    lvlHtml = `<span class="lvl-pill lvl-active">niv. ${fmtNum(m.niveau.cur)} / ∞</span>`;
  } else if (m.levelZero) {
    lvlHtml = `<span class="lvl-pill lvl-zero">niv. 0/${fmtNum(m.niveau.tot)}</span>`;
  } else {
    lvlHtml = `<span class="lvl-pill lvl-finite">niv. ${fmtNum(m.niveau.cur)}/${fmtNum(m.niveau.tot)}</span>`;
  }

  // ── PROGRESSION ───────────────────────────────────────────────────────────
  let progHtml;
  if (m.levelMaxed) {
    progHtml = '<span class="prog-none">palier maximal atteint</span>';
  } else if (!m.progression) {
    progHtml = '<span class="prog-none">—</span>';
  } else {
    const pct = m.progression.pct;
    const pctNum = pct !== null ? pct : 0;
    const color = pctNum >= 0.90 ? 'var(--urgent)'
                : pctNum >= 0.70 ? 'var(--warn)'
                : pctNum >= 0.35 ? 'var(--good)'
                : 'var(--muted)';
    const pctTxt = pct !== null ? (pct*100).toFixed(0)+'%' : '?';
    const cur = fmtNum(m.progression.cur);
    const tot = m.progression.infinite ? '∞' : fmtNum(m.progression.tot);
    const barW = pct !== null ? Math.min(100, pctNum*100).toFixed(0) : 0;
    progHtml = `<div class="prog-cell">
      <div class="prog-bar"><div class="prog-fill" style="width:${barW}%;background:${color}"></div></div>
      <span class="prog-txt">${cur} / ${tot}</span>
      <span class="prog-pct" style="color:${color}">${pctTxt}</span>
    </div>`;
  }

  // ── BADGES JOUEURS (vide si terminé ou auto) ──────────────────────────────
  let joueursHtml = '';
  if (!m.levelMaxed && t.counts && t.counts.length > 0) {
    const badgeStyle = {
      'Solo':     'background:rgba(74,143,255,.1);color:#4a8fff;border-color:rgba(74,143,255,.3)',
      'Duo':      'background:rgba(245,166,35,.1);color:#f5a623;border-color:rgba(245,166,35,.3)',
      'Trio':     'background:rgba(48,201,126,.1);color:#30c97e;border-color:rgba(48,201,126,.3)',
      'Duo/Trio': 'background:rgba(245,166,35,.1);color:#f5a623;border-color:rgba(245,166,35,.3)',
      '5+':       'background:rgba(169,126,255,.1);color:#a97eff;border-color:rgba(169,126,255,.3)',
      'Raid':     'background:rgba(232,121,249,.1);color:#e879f9;border-color:rgba(232,121,249,.3)',
    };
    joueursHtml = `<div style="display:flex;gap:4px;flex-wrap:wrap">${
      t.counts.map(c => `<span style="display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid;${badgeStyle[c]||''}">${c}</span>`).join('')
    }</div>`;
  }

  // ── STATUT (inclut Long terme) ────────────────────────────────────────────
  const prio = priority(m);
  let statusLbl, statusCls;
  if (m.levelMaxed)  { statusLbl = '✅ Terminé';   statusCls = 'b-maxed'; }
  else if (m.skip)   { statusLbl = 'Skip';          statusCls = 'b-skip'; }
  else if (prio===0) { statusLbl = '⚡ Urgent';     statusCls = 'b-urgent'; }
  else if (prio===1) { statusLbl = '🔥 Efficace';   statusCls = 'b-warn'; }
  else if (prio===2) { statusLbl = '✓ En cours';    statusCls = 'b-good'; }
  else if (prio>=6)  { statusLbl = '—';             statusCls = 'b-low'; }
  else               { statusLbl = 'Long terme';    statusCls = 'b-low'; }
  const statusBadge = `<span class="badge ${statusCls}">${statusLbl}</span>`;

  // ── POINTS ────────────────────────────────────────────────────────────────
  const ptsGotHtml  = m.ptsGot  > 0 ? `<span class="pts-pos">${m.ptsGot}</span>`  : `<span class="pts-zero">—</span>`;
  const ptsNextHtml = m.ptsNext > 0 ? `<span style="color:var(--blue)">+${m.ptsNext}</span>` : `<span class="pts-zero">—</span>`;

  return `<tr>
    <td><div style="font-weight:500;font-size:13px">${m.name}</div>${catLabel}</td>
    <td>${progHtml}</td>
    <td>${lvlHtml}</td>
    <td>${joueursHtml}</td>
    <td class="pts-col">${ptsGotHtml}</td>
    <td class="pts-col">${ptsNextHtml}</td>
    <td style="text-align:right">${statusBadge}</td>
  </tr>`;
}

// ── CONTRÔLES ─────────────────────────────────────────────────────────────────────
function setfilter(key, el) {
  FILTER_KEY = key;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderMissions();
}
function resort() {
  SORT = document.getElementById('sort-sel').value;
  renderMissions();
}

window.addEventListener('DOMContentLoaded', () => {
  // Données injectées directement dans le HTML par le scraper PowerShell
  if (typeof INJECTED_DATA !== 'undefined' && INJECTED_DATA && INJECTED_DATA.sections) {
    render(INJECTED_DATA);
  } else {
    document.getElementById('last-update').textContent = 'En attente des données (lancer scraper.ps1)';
    document.getElementById('total-pts').textContent   = '—';
  }
});
</script>
